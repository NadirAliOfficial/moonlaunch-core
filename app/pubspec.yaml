name: moon_launch
description: "MoonLaunch — Create and trade BNB meme coins in minutes."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  custom_flutter_painter: ^1.0.2
  fl_chart: ^1.1.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  http: ^1.6.0
  get_storage: ^2.1.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true

  # REQUIRED for the tool (base icons)
  image_path_android: "assets/images/applogo2.png"
  image_path_ios: "assets/images/applogo2.png"

  # Android adaptive icon (optional but recommended)
  adaptive_icon_foreground: "assets/images/applogo2.png"
  adaptive_icon_background: "#000000"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: BernardMTCondensed
      fonts:
        - asset: assets/fonts/BernardMTCondensedRegular.ttf
    - family: Benne
      fonts:
        - asset: assets/fonts/Benne-Regular.otf
