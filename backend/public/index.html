<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoonLaunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #A21117;
      --red2:   #ca4e5b;
      --dark:   #0d0b14;
      --card:   rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #fff;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/bg.png') center/cover no-repeat;
      opacity: 0.28;
      z-index: 0;
    }

    /* red glow blobs */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #A21117, transparent 70%);
      top: -180px; left: -160px;
    }
    .glow-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ca4e5b, transparent 70%);
      bottom: -150px; right: -120px;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 52px 48px 48px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      max-width: 440px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(202,78,91,0.08);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo {
      width: 200px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 24px rgba(162,17,23,0.5));
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(202,78,91,0.4), transparent);
      margin-bottom: 28px;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── Store Buttons ── */
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(162,17,23,0.12);
      border: 1.5px solid rgba(202,78,91,0.35);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: background 0.22s, border-color 0.22s, transform 0.18s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
    }

    .store-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(202,78,91,0.10) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.22s;
    }

    .store-btn:hover {
      background: rgba(162,17,23,0.25);
      border-color: rgba(202,78,91,0.7);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(162,17,23,0.30);
    }

    .store-btn:hover::before { opacity: 1; }

    .store-btn:active { transform: translateY(-1px); }

    .btn-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon svg {
      width: 30px;
      height: 30px;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      line-height: 1.3;
    }

    .btn-text .small {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.02em;
    }

    .btn-text .big {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .logo { width: 170px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="page">
    <div class="card">

      <div class="logo-wrap">
        <img src="assets/logo.png" alt="MoonLaunch" class="logo" />
      </div>

      <div class="divider"></div>

      <p class="tagline">The next-gen token trading app</p>

      <div class="store-buttons">

        <!-- App Store -->
        <a href="#" class="store-btn" target="_blank">
          <div class="btn-icon">
            <svg viewBox="0 0 30 30" fill="white" xmlns="http://www.w3.org/2000/svg">
              <path d="M21.916 15.98c-.036-3.598 2.94-5.334 3.073-5.417-1.674-2.449-4.277-2.782-5.204-2.816-2.209-.224-4.328 1.307-5.449 1.307-1.123 0-2.844-1.28-4.676-1.245-2.402.036-4.628 1.405-5.866 3.551-2.51 4.351-.64 10.764 1.8 14.283 1.19 1.722 2.604 3.653 4.459 3.583 1.793-.072 2.471-1.156 4.641-1.156 2.169 0 2.793 1.156 4.693 1.12 1.937-.036 3.159-1.759 4.334-3.489 1.374-2.001 1.937-3.938 1.971-4.037-.043-.018-3.772-1.441-3.776-5.684zM18.393 5.56c.99-1.2 1.656-2.863 1.474-4.524-1.424.058-3.153.95-4.177 2.15-.916 1.06-1.718 2.754-1.503 4.38 1.591.122 3.217-.809 4.206-2.006z"/>
            </svg>
          </div>
          <div class="btn-text">
            <span class="small">Download on the</span>
            <span class="big">App Store</span>
          </div>
        </a>

        <!-- Google Play -->
        <a href="#" class="store-btn" target="_blank">
          <div class="btn-icon">
            <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.1 2.1A1.4 1.4 0 0 0 3.6 3v24a1.4 1.4 0 0 0 .5.9l.06.05L17.4 15v-.3L4.16 2.05z" fill="#4FC3F7"/>
              <path d="M21.9 19.5l-4.5-4.5v-.3l4.5-4.5.1.06 5.3 3c1.5.86 1.5 2.25 0 3.1l-5.3 3z" fill="#FFD54F"/>
              <path d="M22 19.44L17.4 15 4.1 28.3a1.7 1.7 0 0 0 2.2.07L22 19.44" fill="#F06292"/>
              <path d="M4.1 1.7a1.7 1.7 0 0 0-2.2.07v.06L15.7 15l4.5-4.5L6.3 1.77A1.7 1.7 0 0 0 4.1 1.7z" fill="#69F0AE"/>
            </svg>
          </div>
          <div class="btn-text">
            <span class="small">Get it on</span>
            <span class="big">Google Play</span>
          </div>
        </a>

      </div>
    </div>

    <p class="footer">&copy; 2026 MoonLaunch. All rights reserved.</p>
  </div>

</body>
</html>
