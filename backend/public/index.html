<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoonLaunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
    }

    /* Full-screen background */
    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/bg.png') center/cover no-repeat;
      z-index: 0;
    }

    /* Page layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: min(480px, 88vw);
      height: auto;
      display: block;
      margin-bottom: 18px;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }

    /* Store buttons */
    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 44px;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #000;
      border: 1.5px solid rgba(255,255,255,0.85);
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      transition: opacity 0.2s, transform 0.18s;
      min-width: 150px;
    }

    .store-btn:hover { opacity: 0.82; transform: translateY(-2px); }

    .store-btn svg { flex-shrink: 0; width: 26px; height: 26px; }

    .store-btn-text { display: flex; flex-direction: column; text-align: left; line-height: 1.25; }
    .store-btn-text .small { font-size: 10px; color: rgba(255,255,255,0.75); letter-spacing: 0.02em; }
    .store-btn-text .big  { font-size: 18px; font-weight: 600; }

    /* Social icons */
    .social {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      background: #fff;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.18s;
    }

    .social a:hover { opacity: 0.85; transform: translateY(-2px); }

    .social a svg { width: 28px; height: 28px; fill: #000; }

    /* Footer links */
    .footer-links {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    .footer-links a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: #fff; }
    .footer-links .sep { color: rgba(255,255,255,0.35); }

    @media (max-width: 400px) {
      .store-btn { min-width: 140px; }
      .social a { width: 54px; height: 54px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
