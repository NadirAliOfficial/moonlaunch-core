<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoonLaunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #A21117;
      --red2:   #ca4e5b;
      --dark:   #0d0b14;
      --card:   rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #fff;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/bg.png') center/cover no-repeat;
      opacity: 0.28;
      z-index: 0;
    }

    /* red glow blobs */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #A21117, transparent 70%);
      top: -180px; left: -160px;
    }
    .glow-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ca4e5b, transparent 70%);
      bottom: -150px; right: -120px;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 52px 48px 48px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      max-width: 440px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(202,78,91,0.08);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo {
      width: 200px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 24px rgba(162,17,23,0.5));
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(202,78,91,0.4), transparent);
      margin-bottom: 28px;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── Store Buttons ── */
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(162,17,23,0.12);
      border: 1.5px solid rgba(202,78,91,0.35);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: background 0.22s, border-color 0.22s, transform 0.18s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
    }

    .store-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(202,78,91,0.10) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.22s;
    }

    .store-btn:hover {
      background: rgba(162,17,23,0.25);
      border-color: rgba(202,78,91,0.7);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(162,17,23,0.30);
    }

    .store-btn:hover::before { opacity: 1; }

    .store-btn:active { transform: translateY(-1px); }

    .btn-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon svg {
      width: 30px;
      height: 30px;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      line-height: 1.3;
    }

    .btn-text .small {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.02em;
    }

    .btn-text .big {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    /* ── Social Icons ── */
    .social {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin-top: 28px;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.2s, border-color 0.2s, transform 0.18s;
      text-decoration: none;
    }

    .social a:hover {
      background: rgba(162,17,23,0.25);
      border-color: rgba(202,78,91,0.6);
      transform: translateY(-3px);
    }

    .social a svg {
      width: 18px;
      height: 18px;
      fill: rgba(255,255,255,0.75);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .logo { width: 170px; }
    }
  </style>
</head>
<body>
